name: Update IPTV Playlist

on:
  schedule:
    - cron: '0 0 * * *'  # Every 24h at midnight UTC
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate playlist
        id: generate
        run: |
          echo "::group::IPTV Playlist Update"
          python scripts/update.py
          echo "::endgroup::"

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet output/playlist.m3u; then
            echo "::notice::No changes detected — playlist unchanged."
          else
            echo "::notice::Playlist updated — new changes detected."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add output/playlist.m3u
          git commit -m "chore: update IPTV playlist [auto]"
          git push
